services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/caregiver_app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../src:/app/src
      - ../prisma:/app/prisma
    command: bun run dev

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: caregiver_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d caregiver_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
